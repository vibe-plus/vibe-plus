name: Release CLI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    name: Check release version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_release: ${{ steps.gate.outputs.should_release }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and workspace versions
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "Tag '${GITHUB_REF_NAME}' must look like v1.2.3 or v1.2.3-alpha.1"
            exit 1
          }
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          CLI_NPM_VERSION="$(node -p "require('./packages/cli-npm/package.json').version")"
          WEB_VERSION="$(node -p "require('./apps/web/package.json').version")"
          [[ "$VERSION" == "$CARGO_VERSION" ]] || {
            echo "Tag $VERSION does not match Cargo workspace version $CARGO_VERSION"
            exit 1
          }
          [[ "$VERSION" == "$CLI_NPM_VERSION" ]] || {
            echo "Tag $VERSION does not match CLI npm wrapper version $CLI_NPM_VERSION"
            exit 1
          }
          echo "CLI/Gateway release version: $VERSION"
          echo "Web package version is independent: $WEB_VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Skip build/publish when @vibe-plus/cli@VERSION is already on npm (e.g. re-pushed tag).
      - name: Compare with npm registry
        uses: EndBug/version-check@095362f3cd50f690c8fa0e6afeea81834bd8d320 # v3.0.0
        id: version
        with:
          static-checking: localIsNew
          file-url: https://unpkg.com/@vibe-plus/cli@latest/package.json
          file-name: packages/cli-npm/package.json

      - name: Release gate
        id: gate
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${{ steps.version.outputs.changed }}" = "true" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will release @vibe-plus/cli@$VERSION (newer than npm latest or not published yet)."
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::@vibe-plus/cli@$VERSION is already on npm — skipping build and publish."
          fi

  # ---------- build matrix ---------------------------------------------------
  build:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            npm_plat: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_plat: win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p vibe

      - name: Smoke test Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/test-windows-cli.ps1 -RepoRoot $env:GITHUB_WORKSPACE -ExePath "$env:GITHUB_WORKSPACE/target/${{ matrix.target }}/release/vibe.exe"

      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p stage/bin
          cp target/${{ matrix.target }}/release/vibe stage/bin/vibe
          chmod +x stage/bin/vibe

      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir stage\bin
          copy target\${{ matrix.target }}\release\vibe.exe stage\bin\vibe.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-${{ matrix.npm_plat }}
          path: stage/

  # ---------- publish to npm -------------------------------------------------
  publish:
    name: Publish to npm
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Populate platform packages
        run: |
          for PLAT in darwin-arm64 win32-x64; do
            DEST="packages/cli-npm/platform/$PLAT/bin"
            mkdir -p "$DEST"
            SRC="artifacts/vibe-$PLAT"
            if [ -f "$SRC/bin/vibe" ]; then
              cp "$SRC/bin/vibe" "$DEST/vibe"
              chmod +x "$DEST/vibe"
            elif [ -f "$SRC/bin/vibe.exe" ]; then
              cp "$SRC/bin/vibe.exe" "$DEST/vibe.exe"
            else
              echo "Missing binary artifact for $PLAT" >&2
              exit 1
            fi
          done

      - name: Stamp versions
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;

          const cliPlatformPackages = [
            "@vibe-plus/cli-darwin-arm64",
            "@vibe-plus/cli-win32-x64",
          ];

          const files = [
            "packages/cli-npm/package.json",
            "packages/cli-npm/platform/darwin-arm64/package.json",
            "packages/cli-npm/platform/win32-x64/package.json",
          ];

          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            pkg.version = version;
            if (pkg.name === "@vibe-plus/cli") {
              pkg.optionalDependencies = Object.fromEntries(
                cliPlatformPackages.map((name) => [name, version]),
              );
            }
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          NODE

      - name: Verify npm package contents
        run: |
          cd packages/cli-npm
          npm run verify -- --require-binaries

      - name: Publish platform packages first
        run: |
          for PLAT in darwin-arm64 win32-x64; do
            cd packages/cli-npm/platform/$PLAT
            PKG=$(node -p "require('./package.json').name")
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG@$VERSION already exists, skipping"
            else
              npm publish --access public
            fi
            cd ../../../../
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibe-plus/cli
        run: |
          cd packages/cli-npm
          PKG=$(node -p "require('./package.json').name")
          if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
            echo "$PKG@$VERSION already exists, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
