name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  tag-check:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag and workspace version
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "Not a tag push"; exit 1; }
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]] || {
            echo "Tag '${GITHUB_REF_NAME}' must look like v1.2.3 or v1.2.3-alpha.1"
            exit 1
          }
          VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          NPM_VERSION="$(node -p "require('./packages/cli-npm/package.json').version")"
          [[ "$VERSION" == "$CARGO_VERSION" ]] || {
            echo "Tag $VERSION does not match Cargo workspace version $CARGO_VERSION"
            exit 1
          }
          [[ "$VERSION" == "$NPM_VERSION" ]] || {
            echo "Tag $VERSION does not match npm wrapper version $NPM_VERSION"
            exit 1
          }

  # ---------- build matrix ---------------------------------------------------
  build:
    needs: tag-check
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-15
            npm_plat: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_plat: win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p vibe

      - name: Smoke test Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./.github/scripts/test-windows-cli.ps1 -RepoRoot $env:GITHUB_WORKSPACE -ExePath "$env:GITHUB_WORKSPACE/target/${{ matrix.target }}/release/vibe.exe"

      - name: Stage binary (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p stage/bin
          cp target/${{ matrix.target }}/release/vibe stage/bin/vibe
          chmod +x stage/bin/vibe

      - name: Stage binary (windows)
        if: runner.os == 'Windows'
        run: |
          mkdir stage\bin
          copy target\${{ matrix.target }}\release\vibe.exe stage\bin\vibe.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibe-${{ matrix.npm_plat }}
          path: stage/

  # ---------- publish to npm -------------------------------------------------
  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Populate platform packages
        run: |
          for PLAT in darwin-arm64 win32-x64; do
            DEST="packages/cli-npm/platform/$PLAT/bin"
            mkdir -p "$DEST"
            SRC="artifacts/vibe-$PLAT"
            if [ -f "$SRC/bin/vibe" ]; then
              cp "$SRC/bin/vibe" "$DEST/vibe"
              chmod +x "$DEST/vibe"
            elif [ -f "$SRC/bin/vibe.exe" ]; then
              cp "$SRC/bin/vibe.exe" "$DEST/vibe.exe"
            else
              echo "Missing binary artifact for $PLAT" >&2
              exit 1
            fi
          done

      - name: Stamp versions
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const version = process.env.VERSION;

          const cliPlatformPackages = [
            "@vibe-plus/cli-darwin-arm64",
            "@vibe-plus/cli-win32-x64",
          ];

          const files = [
            "packages/vibeplus/package.json",
            "packages/cli-npm/package.json",
            "packages/cli-npm/platform/darwin-arm64/package.json",
            "packages/cli-npm/platform/win32-x64/package.json",
          ];

          for (const file of files) {
            const pkg = JSON.parse(fs.readFileSync(file, "utf8"));
            pkg.version = version;
            if (pkg.name === "@vibe-plus/cli") {
              pkg.optionalDependencies = Object.fromEntries(
                cliPlatformPackages.map((name) => [name, version]),
              );
            }
            fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          }
          NODE

      - name: Verify npm package contents
        run: |
          cd packages/cli-npm
          npm run verify -- --require-binaries

      - name: Publish platform packages first
        run: |
          for PLAT in darwin-arm64 win32-x64; do
            cd packages/cli-npm/platform/$PLAT
            PKG=$(node -p "require('./package.json').name")
            if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
              echo "$PKG@$VERSION already exists, skipping"
            else
              npm publish --access public
            fi
            cd ../../../../
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @vibe-plus/cli
        run: |
          cd packages/cli-npm
          PKG=$(node -p "require('./package.json').name")
          if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
            echo "$PKG@$VERSION already exists, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vibeplus (onboarding CLI)
        run: |
          cd packages/vibeplus
          PKG=$(node -p "require('./package.json').name")
          if npm view "$PKG@$VERSION" version >/dev/null 2>&1; then
            echo "$PKG@$VERSION already exists, skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
