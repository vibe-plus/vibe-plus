<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="vibe+ — The unified local AI gateway. Route Claude Code, Codex, OpenCode and more through a single local proxy with multi-key rotation and real-time usage tracking."
    />
    <title>vibe+ · The Unified AI Gateway</title>
    <script>
      // GitHub Pages SPA redirect: restore path saved by 404.html
      (function () {
        var p = sessionStorage.getItem("ghpages-redirect");
        if (p) {
          sessionStorage.removeItem("ghpages-redirect");
          window.history.replaceState(null, "", p);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
