<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" data-vp-brand="true" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta

      content="Vibe+ — The companion for vibe coding. Codex App first; Claude Code and OpenCode are experimental."
    />
    <title>Vibe+ · The companion for vibe coding</title>
    <script>
      // GitHub Pages SPA redirect: restore path saved by 404.html
      (function () {
        var p = sessionStorage.getItem("ghpages-redirect");
        if (p) {
          sessionStorage.removeItem("ghpages-redirect");
          window.history.replaceState(null, "", p);
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
